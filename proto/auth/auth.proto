syntax = "proto3";

package auth;

option go_package = "github.com/junaid9001/zvynt/proto/auth";

service AuthService{
    rpc Signup(SignupRequest)returns(SignupResponse);
    rpc Login(LoginRequest)returns(LoginResponse);
    rpc Health(Empty)returns(Empty);
    rpc GetUser(UserRequest)returns(UserResponse);
}

message SignupRequest{
    string name=1;
    string email=2;
    string password=3;
}

message SignupResponse{
    string user_id=1;
}

message LoginRequest{
    string email=1;
    string password=2;
}

message LoginResponse{
    string user_id =1;
    string access_token=2;
}

message UserRequest{
     oneof identifier {
        string email = 1;
        string user_id = 2;
    }
}

message UserResponse{
    string email = 1;
    string user_id = 2;

}


message Empty{

}
